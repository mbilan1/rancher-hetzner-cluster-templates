---
# ──────────────────────────────────────────────────────────────────────────────
# Hetzner RKE2 Cluster Template — Rancher UI form definition
#
# DECISION: questions.yaml defines the form that Rancher shows when an operator
# creates a cluster from this template. Groups organize fields into logical tabs.
# See: rke2-hetzner-architecture/investigations/inv-001-rancher-cluster-templates.md
#
# NOTE: Rancher supports these field types:
#   string, enum, boolean, int, hostname, multiline, cloudcredential, password
# ──────────────────────────────────────────────────────────────────────────────
questions:

# ═══════════════════════════════════════════════════════════════════════════════
#  General
# ═══════════════════════════════════════════════════════════════════════════════

- variable: cluster.name
  label: "Cluster Name"
  description: "Unique name for this downstream cluster"
  type: string
  required: true
  group: "General"

- variable: cloudCredentialSecretName
  label: "Cloud Credential"
  description: "Rancher Cloud Credential (type: Hetzner) — contains the downstream project's HCLOUD_TOKEN"
  type: cloudcredential
  required: true
  group: "General"

- variable: kubernetesVersion
  label: "Kubernetes Version"
  description: "RKE2 Kubernetes version"
  type: enum
  required: true
  default: "v1.34.4+rke2r1"
  options:
    - "v1.34.4+rke2r1"
    - "v1.33.8+rke2r1"
    - "v1.32.12+rke2r1"
  group: "General"

# ═══════════════════════════════════════════════════════════════════════════════
#  Network
# ═══════════════════════════════════════════════════════════════════════════════

- variable: hetzner.network
  label: "Private Network"
  description: "Hetzner private network name or ID (from management cluster: tofu output network_id)"
  type: string
  required: false
  group: "Network"

- variable: hetzner.usePrivateNetwork
  label: "Use Private Network"
  description: "Use private network for inter-node communication (recommended)"
  type: boolean
  default: true
  group: "Network"

- variable: hetzner.disablePublicIpv4
  label: "Disable Public IPv4"
  description: "Disable public IPv4 on nodes (requires private network)"
  type: boolean
  default: false
  group: "Network"

- variable: hetzner.disablePublicIpv6
  label: "Disable Public IPv6"
  description: "Disable public IPv6 on nodes"
  type: boolean
  default: true
  group: "Network"

# ═══════════════════════════════════════════════════════════════════════════════
#  Machine Image
# ═══════════════════════════════════════════════════════════════════════════════

- variable: hetzner.image
  label: "Machine Image"
  description: |
    Machine OS image for cluster nodes.
    • golden:cis — Auto-build CIS-hardened snapshot with pre-installed RKE2 (recommended for production).
    • golden:base — Auto-build base snapshot with pre-installed RKE2 (no CIS hardening).
    • ubuntu-24.04 — Stock Hetzner image (RKE2 installed at boot, slower provisioning).
    • Snapshot ID (e.g. 363889876) — Use a pre-built Packer snapshot directly.
    Golden images require the hcloud-image-controller to be running on the management cluster.
  type: enum
  default: "golden:cis"
  options:
    - "golden:cis"
    - "golden:base"
    - "ubuntu-24.04"
  required: true
  group: "Machine Image"

# ═══════════════════════════════════════════════════════════════════════════════
#  Node Pool — Pool 1 (all roles)
# ═══════════════════════════════════════════════════════════════════════════════

- variable: nodepools.0.name
  label: "Pool Name"
  description: "Name for the first node pool"
  type: string
  default: "pool-all"
  required: true
  group: "Node Pool 1"

- variable: nodepools.0.quantity
  label: "Node Count"
  description: "Number of nodes in this pool (1 = dev, 3 = HA)"
  type: int
  default: 3
  required: true
  min: 1
  max: 10
  group: "Node Pool 1"

- variable: nodepools.0.etcd
  label: "etcd Role"
  description: "Run etcd on these nodes"
  type: boolean
  default: true
  group: "Node Pool 1"

- variable: nodepools.0.controlplane
  label: "Control Plane Role"
  description: "Run control plane on these nodes"
  type: boolean
  default: true
  group: "Node Pool 1"

- variable: nodepools.0.worker
  label: "Worker Role"
  description: "Schedule workloads on these nodes"
  type: boolean
  default: true
  group: "Node Pool 1"

- variable: nodepools.0.serverType
  label: "Server Type"
  description: "Hetzner Cloud server type"
  type: enum
  default: "cx23"
  options:
    - "cx23"
    - "cx33"
    - "cx43"
    - "cx53"
    - "cpx21"
    - "cpx31"
    - "cpx41"
    - "cpx51"
    - "cax21"
    - "cax31"
    - "cax41"
  group: "Node Pool 1"

- variable: nodepools.0.serverLocation
  label: "Server Location"
  description: "Hetzner Cloud datacenter location"
  type: enum
  default: "hel1"
  options:
    - "fsn1"
    - "nbg1"
    - "hel1"
    - "ash"
    - "hil"
    - "sin"
  group: "Node Pool 1"

- variable: nodepools.0.createFirewall
  label: "Create Firewall"
  description: "Create a shared cluster firewall managed by the driver"
  type: boolean
  default: true
  group: "Node Pool 1"

- variable: nodepools.0.autoCreateFirewallRules
  label: "Auto-Create Firewall Rules"
  description: "Automatically create RKE2 firewall rules (SSH, API, etcd, VXLAN, etc.)"
  type: boolean
  default: true
  show_if: "nodepools.0.createFirewall=true"
  group: "Node Pool 1"

- variable: nodepools.0.autoscaler.enabled
  label: "Enable Pool Autoscaling"
  description: "Enable Rancher-native autoscaling for this pool (nodes stay visible in UI pool)"
  type: boolean
  default: false
  group: "Node Pool 1"

- variable: nodepools.0.autoscaler.minSize
  label: "Min Nodes"
  description: "Minimum nodes when autoscaling (must be ≤ initial quantity)"
  type: int
  default: 1
  min: 0
  max: 100
  show_if: "nodepools.0.autoscaler.enabled=true"
  group: "Node Pool 1"

- variable: nodepools.0.autoscaler.maxSize
  label: "Max Nodes"
  description: "Maximum nodes autoscaler can scale up to"
  type: int
  default: 10
  min: 1
  max: 100
  show_if: "nodepools.0.autoscaler.enabled=true"
  group: "Node Pool 1"

# ═══════════════════════════════════════════════════════════════════════════════
#  Integrations
# ═══════════════════════════════════════════════════════════════════════════════

- variable: hcloud.ccm.enabled
  label: "Hetzner CCM"
  description: "Deploy Hetzner Cloud Controller Manager at bootstrap via additionalManifest (required for LB integration and node lifecycle)"
  type: boolean
  default: true
  group: "Integrations"

- variable: hcloud.token
  label: "Hetzner API Token"
  description: "HCLOUD_TOKEN for downstream cluster CCM (same token as the Cloud Credential). Embedded as a K8s Secret in the downstream cluster."
  type: password
  required: true
  show_if: "hcloud.ccm.enabled=true"
  group: "Integrations"

- variable: hcloud.ccm.version
  label: "CCM Version"
  description: "Hetzner CCM Helm chart version"
  type: string
  default: "1.30.1"
  show_if: "hcloud.ccm.enabled=true"
  group: "Integrations"

# NOTE: Storage (CSI) is not managed by this chart.
# Operators deploy Longhorn, Rook-Ceph, or Hetzner CSI separately.

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Configuration
# ═══════════════════════════════════════════════════════════════════════════════

- variable: clusterConfig.cni
  label: "CNI Plugin"
  description: "Container Network Interface plugin"
  type: enum
  default: "canal"
  options:
    - "canal"
    - "calico"
    - "cilium"
  group: "Configuration"

- variable: clusterConfig.secretsEncryption
  label: "Secrets Encryption"
  description: "Enable encryption of Kubernetes Secrets at rest"
  type: boolean
  default: true
  group: "Configuration"

- variable: clusterConfig.clusterCIDR
  label: "Cluster CIDR"
  description: "IPv4 network CIDR for pod IPs. Must match CCM networking.clusterCIDR when private networking is enabled."
  type: string
  default: "10.42.0.0/16"
  group: "Configuration"

- variable: clusterConfig.serviceCIDR
  label: "Service CIDR"
  description: "IPv4 network CIDR for ClusterIP services"
  type: string
  default: "10.43.0.0/16"
  group: "Configuration"

- variable: clusterConfig.cisProfile.enabled
  label: "CIS Hardening"
  description: "Enable RKE2 CIS 1.11 hardening profile. Fixes file permissions (600), enables audit logging, disables token extension. See https://docs.rke2.io/security/hardening_guide"
  type: boolean
  default: false
  group: "Configuration"

- variable: clusterConfig.cisProfile.profile
  label: "CIS Profile"
  description: "RKE2 CIS profile name"
  type: enum
  default: "cis"
  options:
    - "cis"
    - "cis-1.23"
  show_if: "clusterConfig.cisProfile.enabled=true"
  group: "Configuration"

- variable: clusterConfig.cisProfile.psaTemplate
  label: "PSA Template"
  description: "Pod Security Admission template. rancher-restricted exempts system namespaces from restricted enforcement."
  type: string
  default: "rancher-restricted"
  show_if: "clusterConfig.cisProfile.enabled=true"
  group: "Configuration"

# ═══════════════════════════════════════════════════════════════════════════════
#  Auth Endpoint
# ═══════════════════════════════════════════════════════════════════════════════

- variable: localClusterAuthEndpoint.enabled
  label: "Authorized Cluster Endpoint"
  description: "Enable direct kubectl access to downstream cluster (bypassing Rancher)"
  type: boolean
  default: false
  group: "Auth Endpoint"

- variable: localClusterAuthEndpoint.fqdn
  label: "FQDN"
  description: "FQDN for the Authorized Cluster Endpoint"
  type: hostname
  show_if: "localClusterAuthEndpoint.enabled=true"
  group: "Auth Endpoint"


