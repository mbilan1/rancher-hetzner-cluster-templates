# ──────────────────────────────────────────────────────────────────────────────
# Hetzner RKE2 Cluster Template — Rancher UI form definition
#
# DECISION: questions.yaml defines the form that Rancher shows when an operator
# creates a cluster from this template. Groups organize fields into logical tabs.
# See: rke2-hetzner-architecture/investigations/inv-001-rancher-cluster-templates.md
#
# NOTE: Rancher supports these field types:
#   string, enum, boolean, int, hostname, multiline, cloudcredential, password
# ──────────────────────────────────────────────────────────────────────────────
questions:

# ═══════════════════════════════════════════════════════════════════════════════
#  General
# ═══════════════════════════════════════════════════════════════════════════════

- variable: cluster.name
  label: "Cluster Name"
  description: "Unique name for this downstream cluster"
  type: string
  required: true
  group: "General"

- variable: cloudCredentialSecretName
  label: "Cloud Credential"
  description: "Rancher Cloud Credential (type: Hetzner) — contains the downstream project's HCLOUD_TOKEN"
  type: cloudcredential
  required: true
  group: "General"

- variable: kubernetesVersion
  label: "Kubernetes Version"
  description: "RKE2 Kubernetes version"
  type: enum
  required: true
  default: "v1.32.3+rke2r1"
  options:
    - "v1.32.3+rke2r1"
    - "v1.31.5+rke2r1"
    - "v1.30.9+rke2r1"
  group: "General"

# ═══════════════════════════════════════════════════════════════════════════════
#  Network
# ═══════════════════════════════════════════════════════════════════════════════

- variable: hetzner.network
  label: "Private Network"
  description: "Hetzner private network name or ID (from management cluster: tofu output network_id)"
  type: string
  required: false
  group: "Network"

- variable: hetzner.usePrivateNetwork
  label: "Use Private Network"
  description: "Use private network for inter-node communication (recommended)"
  type: boolean
  default: true
  group: "Network"

- variable: hetzner.disablePublicIpv4
  label: "Disable Public IPv4"
  description: "Disable public IPv4 on nodes (requires private network)"
  type: boolean
  default: false
  group: "Network"

- variable: hetzner.disablePublicIpv6
  label: "Disable Public IPv6"
  description: "Disable public IPv6 on nodes"
  type: boolean
  default: true
  group: "Network"

# ═══════════════════════════════════════════════════════════════════════════════
#  Node Pool — Pool 1 (all roles)
# ═══════════════════════════════════════════════════════════════════════════════

- variable: nodepools.0.name
  label: "Pool Name"
  description: "Name for the first node pool"
  type: string
  default: "pool-all"
  required: true
  group: "Node Pool 1"

- variable: nodepools.0.quantity
  label: "Node Count"
  description: "Number of nodes in this pool (1 = dev, 3 = HA)"
  type: int
  default: 3
  required: true
  min: 1
  max: 10
  group: "Node Pool 1"

- variable: nodepools.0.etcd
  label: "etcd Role"
  description: "Run etcd on these nodes"
  type: boolean
  default: true
  group: "Node Pool 1"

- variable: nodepools.0.controlplane
  label: "Control Plane Role"
  description: "Run control plane on these nodes"
  type: boolean
  default: true
  group: "Node Pool 1"

- variable: nodepools.0.worker
  label: "Worker Role"
  description: "Schedule workloads on these nodes"
  type: boolean
  default: true
  group: "Node Pool 1"

- variable: nodepools.0.serverType
  label: "Server Type"
  description: "Hetzner Cloud server type"
  type: enum
  default: "cx23"
  options:
    - "cx23"
    - "cx33"
    - "cx43"
    - "cx53"
    - "cpx21"
    - "cpx31"
    - "cpx41"
    - "cpx51"
    - "cax21"
    - "cax31"
    - "cax41"
  group: "Node Pool 1"

- variable: nodepools.0.serverLocation
  label: "Server Location"
  description: "Hetzner Cloud datacenter location"
  type: enum
  default: "fsn1"
  options:
    - "fsn1"
    - "nbg1"
    - "hel1"
    - "ash"
    - "hil"
    - "sin"
  group: "Node Pool 1"

- variable: nodepools.0.createFirewall
  label: "Create Firewall"
  description: "Create a shared cluster firewall managed by the driver"
  type: boolean
  default: true
  group: "Node Pool 1"

- variable: nodepools.0.autoCreateFirewallRules
  label: "Auto-Create Firewall Rules"
  description: "Automatically create RKE2 firewall rules (SSH, API, etcd, VXLAN, etc.)"
  type: boolean
  default: true
  show_if: "nodepools.0.createFirewall=true"
  group: "Node Pool 1"

# ═══════════════════════════════════════════════════════════════════════════════
#  Integrations
# ═══════════════════════════════════════════════════════════════════════════════

- variable: hcloud.ccm.enabled
  label: "Hetzner CCM"
  description: "Deploy Hetzner Cloud Controller Manager (required for LB integration)"
  type: boolean
  default: true
  group: "Integrations"

- variable: hcloud.ccm.version
  label: "CCM Version"
  description: "Hetzner CCM Helm chart version"
  type: string
  default: "1.30.1"
  show_if: "hcloud.ccm.enabled=true"
  group: "Integrations"

- variable: hcloud.csi.enabled
  label: "Hetzner CSI"
  description: "Deploy Hetzner CSI Driver (required for persistent volumes)"
  type: boolean
  default: true
  group: "Integrations"

- variable: hcloud.csi.version
  label: "CSI Version"
  description: "Hetzner CSI Driver Helm chart version"
  type: string
  default: "2.20.0"
  show_if: "hcloud.csi.enabled=true"
  group: "Integrations"

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Configuration
# ═══════════════════════════════════════════════════════════════════════════════

- variable: clusterConfig.cni
  label: "CNI Plugin"
  description: "Container Network Interface plugin"
  type: enum
  default: "canal"
  options:
    - "canal"
    - "calico"
    - "cilium"
  group: "Configuration"

- variable: clusterConfig.secretsEncryption
  label: "Secrets Encryption"
  description: "Enable encryption of Kubernetes Secrets at rest"
  type: boolean
  default: true
  group: "Configuration"

# ═══════════════════════════════════════════════════════════════════════════════
#  Auth Endpoint
# ═══════════════════════════════════════════════════════════════════════════════

- variable: localClusterAuthEndpoint.enabled
  label: "Authorized Cluster Endpoint"
  description: "Enable direct kubectl access to downstream cluster (bypassing Rancher)"
  type: boolean
  default: false
  group: "Auth Endpoint"

- variable: localClusterAuthEndpoint.fqdn
  label: "FQDN"
  description: "FQDN for the Authorized Cluster Endpoint"
  type: hostname
  show_if: "localClusterAuthEndpoint.enabled=true"
  group: "Auth Endpoint"

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Autoscaler
# ═══════════════════════════════════════════════════════════════════════════════

- variable: autoscaler.enabled
  label: "Enable Cluster Autoscaler"
  description: "Deploy Kubernetes Cluster Autoscaler with Hetzner Cloud provider. Automatically creates/deletes Hetzner servers based on pod demand. Requires HCLOUD_TOKEN secret in downstream kube-system namespace."
  type: boolean
  default: false
  group: "Autoscaler"

- variable: autoscaler.version
  label: "Chart Version"
  description: "Cluster Autoscaler Helm chart version from kubernetes.github.io/autoscaler"
  type: string
  default: "9.43.2"
  show_if: "autoscaler.enabled=true"
  group: "Autoscaler"

# ── Node Group 1 ──────────────────────────────────────────────────────────────
# NOTE: Rancher questions.yaml supports array indexing (nodeGroups.0.name, etc.)
# Additional node groups can be added via Helm values directly.

- variable: autoscaler.nodeGroups.0.name
  label: "Pool Name"
  description: "Unique name for autoscaler pool (used as server name prefix)"
  type: string
  default: "workers"
  show_if: "autoscaler.enabled=true"
  group: "Autoscaler"

- variable: autoscaler.nodeGroups.0.minSize
  label: "Min Nodes"
  description: "Minimum number of nodes (0 = scale to zero when idle)"
  type: int
  default: 1
  min: 0
  max: 100
  show_if: "autoscaler.enabled=true"
  group: "Autoscaler"

- variable: autoscaler.nodeGroups.0.maxSize
  label: "Max Nodes"
  description: "Maximum number of nodes the autoscaler can create"
  type: int
  default: 10
  min: 1
  max: 100
  show_if: "autoscaler.enabled=true"
  group: "Autoscaler"

- variable: autoscaler.nodeGroups.0.serverType
  label: "Server Type"
  description: "Hetzner server type for autoscaler nodes"
  type: enum
  default: "cx33"
  options:
    - "cx22"
    - "cx32"
    - "cx42"
    - "cx52"
    - "cpx21"
    - "cpx31"
    - "cpx41"
    - "cpx51"
    - "cax21"
    - "cax31"
    - "cax41"
  show_if: "autoscaler.enabled=true"
  group: "Autoscaler"

- variable: autoscaler.nodeGroups.0.serverLocation
  label: "Server Location"
  description: "Hetzner datacenter for autoscaler nodes"
  type: enum
  default: "fsn1"
  options:
    - "fsn1"
    - "nbg1"
    - "hel1"
    - "ash"
    - "hil"
    - "sin"
  show_if: "autoscaler.enabled=true"
  group: "Autoscaler"

# ── RKE2 Join Configuration ──────────────────────────────────────────────────

- variable: autoscaler.rke2.serverUrl
  label: "RKE2 Server URL"
  description: "Control plane URL for autoscaler nodes to join (e.g., https://10.0.1.1:9345). Get from control plane node or load balancer."
  type: string
  show_if: "autoscaler.enabled=true"
  group: "Autoscaler"

- variable: autoscaler.rke2.joinToken
  label: "RKE2 Join Token"
  description: "Cluster token for autoscaler nodes to authenticate. Get from CP node: cat /var/lib/rancher/rke2/server/node-token"
  type: password
  show_if: "autoscaler.enabled=true"
  group: "Autoscaler"

# ── Scale-Down Behavior ──────────────────────────────────────────────────────

- variable: autoscaler.scaleDown.enabled
  label: "Scale Down Enabled"
  description: "Allow autoscaler to remove underutilized nodes"
  type: boolean
  default: true
  show_if: "autoscaler.enabled=true"
  group: "Autoscaler"

- variable: autoscaler.scaleDown.delay
  label: "Scale Down Delay"
  description: "Wait time after scale-up before considering scale-down"
  type: string
  default: "10m"
  show_if: "autoscaler.enabled=true&&autoscaler.scaleDown.enabled=true"
  group: "Autoscaler"

- variable: autoscaler.scaleDown.unneededTime
  label: "Unneeded Time"
  description: "How long a node must be unneeded before removal"
  type: string
  default: "10m"
  show_if: "autoscaler.enabled=true&&autoscaler.scaleDown.enabled=true"
  group: "Autoscaler"

- variable: autoscaler.scaleDown.utilizationThreshold
  label: "Utilization Threshold"
  description: "Resource utilization below this threshold marks a node for scale-down (0.0–1.0)"
  type: string
  default: "0.5"
  show_if: "autoscaler.enabled=true&&autoscaler.scaleDown.enabled=true"
  group: "Autoscaler"
