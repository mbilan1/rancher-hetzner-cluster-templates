{{/*
────────────────────────────────────────────────────────────────────────────────
Hetzner RKE2 Cluster Template — Cluster CRD

DECISION: Hetzner-only — no multi-cloud conditionals.
Why: Upstream rancher/cluster-template-examples has if/else for aws, azure, do,
     vsphere, harvester. This chart only supports Hetzner, keeping the template
     clean and focused.

DECISION: cloud-provider-name: external is hardcoded in machineGlobalConfig.
Why: Required for Hetzner CCM to manage node lifecycle and LB integration.

DECISION: CCM deployed via additionalManifest with spec.bootstrap: true.
Why: ManagedChart requires cluster-agent, but cloud-provider-name: external
     adds node.cloudprovider.kubernetes.io/uninitialized=true:NoSchedule taint.
     cattle-cluster-agent does NOT tolerate this taint → deadlock.
     additionalManifest + HelmChart CRD with bootstrap: true deploys CCM at
     RKE2 startup, BEFORE cluster-agent needs to schedule.
See: https://docs.rke2.io/helm (spec.bootstrap field)
────────────────────────────────────────────────────────────────────────────────
*/}}
apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: {{ include "hetzner-cluster-template.clusterName" . }}
  namespace: fleet-default
  {{- with .Values.cluster.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.cluster.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.cloudCredentialSecretName }}
  cloudCredentialSecretName: {{ .Values.cloudCredentialSecretName }}
  {{- end }}
  kubernetesVersion: {{ .Values.kubernetesVersion }}
  enableNetworkPolicy: true
  {{- if and .Values.clusterConfig.cisProfile.enabled .Values.clusterConfig.cisProfile.psaTemplate }}
  {{/*
  DECISION: PSA template for CIS mode.
  Why: CIS profile enables Pod Security Admission enforcement. Without exemptions,
       system namespaces (kube-system, cattle-system, cattle-fleet-system) are blocked
       by "restricted" policy. rancher-restricted is a built-in Rancher template that
       exempts system namespaces from restricted enforcement.
  */}}
  defaultPodSecurityAdmissionConfigurationTemplateName: {{ .Values.clusterConfig.cisProfile.psaTemplate }}
  {{- end }}
  {{- if .Values.localClusterAuthEndpoint.enabled }}
  localClusterAuthEndpoint:
    enabled: {{ .Values.localClusterAuthEndpoint.enabled }}
    fqdn: {{ .Values.localClusterAuthEndpoint.fqdn | quote }}
    {{- if .Values.localClusterAuthEndpoint.caCerts }}
    caCerts: |
      {{ .Values.localClusterAuthEndpoint.caCerts | nindent 6 }}
    {{- end }}
  {{- end }}
  rkeConfig:
    machinePools:
    {{- range $index, $nodepool := .Values.nodepools }}
    - name: {{ $nodepool.name }}
      displayName: {{ $nodepool.displayName | default $nodepool.name }}
      controlPlaneRole: {{ $nodepool.controlplane }}
      etcdRole: {{ $nodepool.etcd }}
      workerRole: {{ $nodepool.worker }}
      quantity: {{ $nodepool.quantity }}
      {{/*
      DECISION: Auto-pause machine pools using golden: images.
      Why: golden:cis/golden:base images require hcloud-image-controller to resolve
           the image to a real snapshot ID before Rancher can provision nodes.
           Without pausing, Rancher creates machines with literal "golden:cis" as
           the image name → Hetzner rejects it → CreateError → delete loop.
           The controller unpauses after resolving the snapshot (see ADR-012).
           For non-golden images, the pool starts immediately as before.
      See: rke2-hetzner-architecture/investigations/inv-004-downstream-provisioning-pitfalls.md
      */}}
      {{- $effectiveImage := $nodepool.image | default $.Values.hetzner.image | default "ubuntu-24.04" }}
      {{- $isGolden := hasPrefix "golden:" $effectiveImage }}
      paused: {{ if $isGolden }}true{{ else }}{{ $nodepool.paused | default false }}{{ end }}
      machineConfigRef:
        kind: HetznerConfig
        name: {{ $nodepool.name }}
      {{- if $nodepool.rollingUpdate }}
      rollingUpdate:
        maxUnavailable: {{ $nodepool.rollingUpdate.maxUnavailable | default "1" }}
        maxSurge: {{ $nodepool.rollingUpdate.maxSurge | default "1" }}
      {{- end }}
      {{- with $nodepool.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $nodepool.taints }}
      taints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and $nodepool.autoscaler $nodepool.autoscaler.enabled }}
      {{/*
      DECISION: Rancher-native machine pool autoscaling via CAPI autoscaler annotations.
      Why: Nodes created via machineDeploymentAnnotations go through the Node Driver,
           so they ARE visible in the Rancher UI machine pool — unlike standalone CA.
      Verified: 2026-03-04 — tested with zsys-studio Hetzner driver, scale-up/down works.
      See: rke2-hetzner-architecture/decisions/adr-008-capi-autoscaler-annotations.md
      */}}
      machineDeploymentAnnotations:
        cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: {{ $nodepool.autoscaler.minSize | default 0 | quote }}
        cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: {{ $nodepool.autoscaler.maxSize | default 10 | quote }}
      {{- end }}
    {{- end }}
    machineGlobalConfig:
      cni: {{ .Values.clusterConfig.cni | default "canal" }}
      cloud-provider-name: {{ .Values.clusterConfig.cloudProviderName | default "external" }}
      {{- if and (eq (default "external" .Values.clusterConfig.cloudProviderName) "external") (not .Values.hcloud.ccm.enabled) }}
      {{- fail "clusterConfig.cloudProviderName is 'external' but hcloud.ccm.enabled is false. This causes a permanent NoSchedule taint deadlock. Either enable CCM or set cloudProviderName to empty string." }}
      {{- end }}
      cluster-cidr: {{ .Values.clusterConfig.clusterCIDR | default "10.42.0.0/16" }}
      service-cidr: {{ .Values.clusterConfig.serviceCIDR | default "10.43.0.0/16" }}
      {{- if .Values.clusterConfig.secretsEncryption }}
      secrets-encryption: true
      {{- end }}
      {{- if .Values.clusterConfig.cisProfile.enabled }}
      {{/*
      DECISION: CIS 1.11 hardening via RKE2 profile.
      Why: `profile: cis` in machineGlobalConfig makes RKE2 apply CIS hardening
           at bootstrap: file permissions, audit logging, token expiration, etc.
           Fixes all 9 automated CIS FAIL checks without manual cloud-init.
      See: https://docs.rke2.io/security/hardening_guide
      */}}
      profile: {{ .Values.clusterConfig.cisProfile.profile | default "cis" }}
      {{/*
      DECISION: service-account-extend-token-expiration=false for CIS 1.11.
      Why: CIS 1.11 (v1.29+) requires this kube-apiserver arg. Without it,
           CIS benchmark check 1.2.30 fails. Not needed for older CIS versions.
      See: https://docs.rke2.io/security/hardening_guide (v1.29+ config tab)
      */}}
      kube-apiserver-arg:
        - "service-account-extend-token-expiration=false"
      {{- end }}
    {{- if .Values.hcloud.ccm.enabled }}
    {{- if not .Values.hcloud.token }}
    {{- fail "hcloud.token is required when hcloud.ccm.enabled=true. Without CCM, cloud-provider-name: external causes a permanent NoSchedule taint deadlock (node.cloudprovider.kubernetes.io/uninitialized)." }}
    {{- end }}
    {{/*
    DECISION: Deploy CCM via additionalManifest (RKE2 HelmChart CRD).
    Why: cloud-provider-name: external adds NoSchedule taint on all nodes.
         ManagedChart needs cluster-agent → agent can't schedule → deadlock.
         additionalManifest is written to /var/lib/rancher/rke2/server/manifests/
         and processed by RKE2's Helm controller at bootstrap time.
         spec.bootstrap: true is the native RKE2 field designed for CCM.
    See: https://docs.rke2.io/helm
    */}}
    additionalManifest: |-
      ---
      apiVersion: v1
      kind: Secret
      metadata:
        name: hcloud
        namespace: kube-system
      type: Opaque
      stringData:
        token: {{ .Values.hcloud.token | quote }}
        {{- if .Values.hetzner.network }}
        network: {{ .Values.hetzner.network | quote }}
        {{- end }}
      ---
      apiVersion: helm.cattle.io/v1
      kind: HelmChart
      metadata:
        name: hcloud-ccm
        namespace: kube-system
      spec:
        bootstrap: true
        repo: https://charts.hetzner.cloud
        chart: hcloud-cloud-controller-manager
        version: {{ .Values.hcloud.ccm.version | quote }}
        targetNamespace: kube-system
        valuesContent: |-
          networking:
            enabled: {{ .Values.hetzner.usePrivateNetwork | default false }}
            clusterCIDR: {{ .Values.clusterConfig.clusterCIDR | default "10.42.0.0/16" }}
    {{- end }}
    upgradeStrategy:
      controlPlaneDrainOptions:
        enabled: {{ .Values.upgradeStrategy.controlPlaneDrainOptions.enabled | default false }}
      workerDrainOptions:
        enabled: {{ .Values.upgradeStrategy.workerDrainOptions.enabled | default false }}
      workerConcurrency: {{ .Values.upgradeStrategy.workerConcurrency | default "10%" | quote }}
      controlPlaneConcurrency: {{ .Values.upgradeStrategy.controlPlaneConcurrency | default "10%" | quote }}
    {{- if .Values.agentEnvs }}
    agentEnvVars:
      {{- toYaml .Values.agentEnvs | nindent 6 }}
    {{- end }}
