{{/*
────────────────────────────────────────────────────────────────────────────────
Hetzner RKE2 Cluster Template — HetznerConfig CRDs

DECISION: One HetznerConfig per node pool.
Why: Each node pool may have different server types, locations, and firewall
     settings. The machineConfigRef in the Cluster CRD references these by name.
See: rke2-hetzner-architecture/investigations/inv-002-hetzner-machine-driver.md

NOTE: CRD kind "HetznerConfig" is derived by Rancher from the driver name:
      "hetzner" → PascalCase + "Config" → "HetznerConfig"
      apiGroup: rke-machine-config.cattle.io/v1
────────────────────────────────────────────────────────────────────────────────
*/}}
{{- range $index, $nodepool := .Values.nodepools }}
apiVersion: rke-machine-config.cattle.io/v1
kind: HetznerConfig
metadata:
  name: {{ $nodepool.name }}
  namespace: fleet-default
  labels:
    {{- include "hetzner-cluster-template.labels" $ | nindent 4 }}
# NOTE: HetznerConfig fields are top-level (not under spec).
# This matches the zsys-studio driver's CRD schema.
serverType: {{ $nodepool.serverType | default "cx23" }}
serverLocation: {{ $nodepool.serverLocation | default "nbg1" }}
image: {{ $nodepool.image | default $.Values.hetzner.image | default "ubuntu-24.04" | quote }}
usePrivateNetwork: {{ $.Values.hetzner.usePrivateNetwork | default false }}
{{- if $.Values.hetzner.network }}
networks:
  - {{ $.Values.hetzner.network | quote }}
{{- end }}
disablePublicIpv4: {{ $.Values.hetzner.disablePublicIpv4 | default false }}
disablePublicIpv6: {{ $.Values.hetzner.disablePublicIpv6 | default true }}
createFirewall: {{ $nodepool.createFirewall | default true }}
autoCreateFirewallRules: {{ $nodepool.autoCreateFirewallRules | default true }}
clusterId: {{ include "hetzner-cluster-template.clusterName" $ }}
{{/*
DECISION: CIS host prerequisites are baked into the OS image via Packer, NOT userData.
Why: rancher-machine intercepts flags matching nameIsUserData() (any flag name
     containing "user-data", "userdata", "custom-data", or "cloud-config") and
     REPLACES the value with a temp file path to Rancher's bootstrap cloud-init.
     The --hetzner-user-data flag matches → inline CIS content is silently lost.
     Packer baked image (Hetzner snapshot with etcd user + sysctl) avoids this.
     The default image (hetzner.image) should be a CIS-ready Packer snapshot.
See: hetzner-cluster-template.cisPackerReference helper for what must be in the image.
*/}}
{{- if $nodepool.userData }}
userData: {{ $nodepool.userData | quote }}
{{- end }}
{{- if $nodepool.placementGroup }}
placementGroup: {{ $nodepool.placementGroup | quote }}
{{- end }}
{{- if $nodepool.existingSshKey }}
existingSshKey: {{ $nodepool.existingSshKey | quote }}
{{- end }}
---
{{- end }}
