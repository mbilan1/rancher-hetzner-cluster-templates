{{/*
────────────────────────────────────────────────────────────────────────────────
Hetzner RKE2 Cluster Template — Cluster Autoscaler

DECISION: Deploy the Kubernetes Cluster Autoscaler with Hetzner Cloud provider
into downstream clusters via ManagedChart.
Why: Hetzner has no managed autoscaling. The official kubernetes/autoscaler
     project includes a Hetzner cloud provider that creates/deletes servers
     directly via the Hetzner API based on pending pod demand.
See: rke2-hetzner-architecture/decisions/adr-007-cluster-autoscaler.md

ARCHITECTURE:
  1. ClusterRepo registers the official autoscaler Helm chart repository
  2. ManagedChart deploys cluster-autoscaler into the downstream cluster
  3. Autoscaler monitors pending pods → creates Hetzner servers via API
  4. New servers bootstrap as RKE2 agents via cloud-init and join the cluster
  5. When demand drops, autoscaler cordons + drains + deletes idle servers

PREREQUISITES:
  - HCLOUD_TOKEN secret must exist in the downstream cluster's kube-system
    namespace (same secret used by CCM and CSI — see docs/USAGE.md)
  - autoscaler.rke2.serverUrl and autoscaler.rke2.joinToken must be provided
    (obtain after cluster creation — see docs/USAGE.md)

NODE GROUP FORMAT:
  The Hetzner CA uses: --nodes=<min>:<max>:<SERVER_TYPE>:<LOCATION>:<POOL_NAME>
  Example: --nodes=1:10:CX33:FSN1:workers

COMPROMISE: Autoscaler-created nodes are NOT tracked by Rancher machine pools.
  They appear as regular Kubernetes nodes but are managed by the autoscaler,
  not by Rancher. This is acceptable for ephemeral worker nodes that scale
  based on demand. Control plane nodes are NEVER autoscaled.
────────────────────────────────────────────────────────────────────────────────
*/}}
{{- if .Values.autoscaler.enabled }}
{{/*
Step 1: Register the official autoscaler Helm chart repository as a ClusterRepo.
This is idempotent — if it already exists, it will be updated.
*/}}
apiVersion: catalog.cattle.io/v1
kind: ClusterRepo
metadata:
  name: kubernetes-autoscaler
spec:
  url: https://kubernetes.github.io/autoscaler
---
{{/*
Step 2: Deploy cluster-autoscaler via ManagedChart into the downstream cluster.
Uses the official cluster-autoscaler Helm chart with cloudProvider: hetzner.
*/}}
apiVersion: management.cattle.io/v3
kind: ManagedChart
metadata:
  name: cluster-autoscaler-{{ include "hetzner-cluster-template.clusterName" . }}
  namespace: fleet-default
  labels:
    {{- include "hetzner-cluster-template.labels" . | nindent 4 }}
spec:
  chart: cluster-autoscaler
  repoName: kubernetes-autoscaler
  releaseName: cluster-autoscaler
  version: {{ .Values.autoscaler.version | quote }}
  defaultNamespace: kube-system
  values:
    cloudProvider: hetzner
    # ── Node Groups ────────────────────────────────────────────────────────
    # Each node group maps to a Hetzner server type + location combination.
    # Format: SERVER_TYPE:LOCATION:POOL_NAME (uppercase for Hetzner API)
    autoscalingGroups:
    {{- range .Values.autoscaler.nodeGroups }}
      - name: {{ printf "%s:%s:%s" (.serverType | upper) (.serverLocation | upper) .name | quote }}
        minSize: {{ .minSize }}
        maxSize: {{ .maxSize }}
    {{- end }}
    # ── Hetzner Environment Variables ──────────────────────────────────────
    # HCLOUD_TOKEN: from the same 'hcloud' Secret used by CCM and CSI
    # HCLOUD_CLOUD_INIT: base64-encoded cloud-init that bootstraps RKE2 agents
    extraEnv:
      HCLOUD_TOKEN:
        secretKeyRef:
          name: hcloud
          key: token
      HCLOUD_CLOUD_INIT: {{ include "hetzner-cluster-template.autoscalerCloudInit" . | b64enc | quote }}
      HCLOUD_IMAGE: {{ .Values.hetzner.image | default "ubuntu-24.04" | quote }}
      {{- with (coalesce .Values.autoscaler.network .Values.hetzner.network) }}
      HCLOUD_NETWORK: {{ . | quote }}
      {{- end }}
      {{- with .Values.autoscaler.firewall }}
      HCLOUD_FIREWALL: {{ . | quote }}
      {{- end }}
      {{- with .Values.autoscaler.sshKey }}
      HCLOUD_SSH_KEY: {{ . | quote }}
      {{- end }}
      HCLOUD_PUBLIC_IPV4: {{ ternary "false" "true" (.Values.hetzner.disablePublicIpv4 | default false) | quote }}
      HCLOUD_PUBLIC_IPV6: {{ ternary "false" "true" (.Values.hetzner.disablePublicIpv6 | default true) | quote }}
    # ── Autoscaler Behavior ────────────────────────────────────────────────
    extraArgs:
      scale-down-enabled: {{ .Values.autoscaler.scaleDown.enabled | default true | quote }}
      scale-down-delay-after-add: {{ .Values.autoscaler.scaleDown.delay | default "10m" | quote }}
      scale-down-unneeded-time: {{ .Values.autoscaler.scaleDown.unneededTime | default "10m" | quote }}
      scale-down-utilization-threshold: {{ .Values.autoscaler.scaleDown.utilizationThreshold | default "0.5" | quote }}
      max-graceful-termination-sec: "600"
      balance-similar-node-groups: "true"
      skip-nodes-with-system-pods: "false"
      skip-nodes-with-local-storage: "false"
    # ── Scheduling ─────────────────────────────────────────────────────────
    # Run autoscaler on control plane nodes (most stable, not subject to scale-down)
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: CriticalAddonsOnly
        operator: Exists
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    rbac:
      create: true
      serviceAccount:
        create: true
        name: cluster-autoscaler
  targets:
    - clusterName: {{ include "hetzner-cluster-template.clusterName" . }}
---
{{- end }}
