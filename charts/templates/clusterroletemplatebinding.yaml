{{/*
────────────────────────────────────────────────────────────────────────────────
Hetzner RKE2 Cluster Template — RBAC ClusterRoleTemplateBinding

DECISION: CRTBs are created in fleet-default namespace (where the Cluster CRD lives).
Why: Rancher auto-generates a cluster namespace (c-m-XXXXX) AFTER the Cluster CRD
     is created. We cannot predict it at Helm render time. Creating CRTBs in
     fleet-default with the clusterName reference allows Rancher's RBAC controller
     to pick them up and apply them to the correct cluster namespace.

NOTE: This follows the pattern from Rancher's own cluster provisioning flow where
      CRTBs are initially created in the same namespace as the Cluster CRD.
────────────────────────────────────────────────────────────────────────────────
*/}}
{{- $root := . }}
{{- range $index, $member := .Values.clusterMembers }}
apiVersion: management.cattle.io/v3
kind: ClusterRoleTemplateBinding
metadata:
  name: crtb-{{ $root.Values.cluster.name }}-{{ trunc 8 (sha256sum (printf "%s/%s" $root.Release.Namespace $member.principalName)) }}
  namespace: {{ $root.Values.cluster.name }}
  labels:
    {{- include "hetzner-cluster-template.labels" $root | nindent 4 }}
clusterName: {{ $root.Values.cluster.name }}
roleTemplateName: {{ $member.roleTemplateName }}
userPrincipalName: {{ $member.principalName }}
---
{{- end }}
