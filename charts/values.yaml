# ──────────────────────────────────────────────────────────────────────────────
# Hetzner RKE2 Cluster Template — Default values
#
# DECISION: Values are Hetzner-specific only. No multi-cloud conditionals.
# Why: Unlike upstream rancher/cluster-template-examples which supports AWS,
#      Azure, DO, vSphere — this chart is Hetzner-only. This keeps the chart
#      simple and the UI form focused.
# See: rke2-hetzner-architecture/designs/des-001-cluster-template-helm-chart.md
#
# DECISION: Network name is pre-fillable from terraform-hcloud-rancher output.
# Why: ADR-005 — downstream clusters share the management cluster's private
#      network. The network_id output from tofu is used to pre-fill this value.
# ──────────────────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Identity
# ═══════════════════════════════════════════════════════════════════════════════

cluster:
  name: ""
  labels: {}
  annotations: {}

# ═══════════════════════════════════════════════════════════════════════════════
#  Rancher Cloud Credential
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: This references a Rancher Cloud Credential secret (type: Hetzner).
# Created manually in Rancher UI: Cluster Management → Cloud Credentials → Create.
# Contains the downstream project's HCLOUD_TOKEN (scoped to one Hetzner Project).
cloudCredentialSecretName: ""

# ═══════════════════════════════════════════════════════════════════════════════
#  Kubernetes
# ═══════════════════════════════════════════════════════════════════════════════

kubernetesVersion: "v1.32.3+rke2r1"

# ═══════════════════════════════════════════════════════════════════════════════
#  Hetzner Global Settings
# ═══════════════════════════════════════════════════════════════════════════════

hetzner:
  # Pre-fill with management cluster network name (from `tofu output network_id`)
  # ADR-005: Downstream clusters join the management cluster's private network.
  network: ""
  usePrivateNetwork: true
  disablePublicIpv4: false
  disablePublicIpv6: true
  image: ubuntu-24.04

# ═══════════════════════════════════════════════════════════════════════════════
#  Node Pools
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: Default is a single converged pool (etcd + cp + worker) with 3 nodes.
# Why: Simplest HA setup for small/medium workloads. Operators can add dedicated
#      worker pools or split roles via the Rancher UI form (questions.yaml).
nodepools:
  - name: pool-all
    displayName: "All Roles"
    quantity: 3
    etcd: true
    controlplane: true
    worker: true
    # DECISION: cx23 as default — cheapest server type for downstream clusters.
    # 2 vCPU, 4 GB RAM, 40 GB disk. Sufficient for small workloads.
    # Scale up to cx33/cx43 for production via questions.yaml dropdown.
    serverType: cx23
    serverLocation: fsn1
    # DECISION: createFirewall + autoCreateFirewallRules = true by default.
    # Why: The zsys-studio driver manages a shared cluster firewall automatically.
    # It adds/removes node IPs as /32 source CIDRs for internal rules.
    # See: rke2-hetzner-architecture/investigations/inv-002-hetzner-machine-driver.md
    createFirewall: true
    autoCreateFirewallRules: true
    paused: false
    labels: {}
    taints: []
    userData: ""
    placementGroup: ""
    existingSshKey: ""
    rollingUpdate:
      maxUnavailable: "1"
      maxSurge: "1"

# ═══════════════════════════════════════════════════════════════════════════════
#  Hetzner Cloud Integrations (deployed via ManagedChart into downstream)
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: CCM and CSI are enabled by default via ManagedChart.
# Why: Every Hetzner K8s cluster needs CCM (for LB integration, node lifecycle)
#      and CSI (for persistent volumes). Without them, the cluster is not usable
#      for production workloads.
# COMPROMISE: HCLOUD_TOKEN delivery to downstream clusters is a manual step.
#   The ManagedChart deploys the Helm charts but the token Secret must be
#   created in the downstream cluster manually. See docs/USAGE.md.
hcloud:
  ccm:
    enabled: true
    version: "1.30.1"
  csi:
    enabled: true
    version: "2.20.0"

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Autoscaler (Hetzner Cloud Provider)
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: Kubernetes Cluster Autoscaler with Hetzner cloud provider.
# Why: Hetzner does not provide managed autoscaling. The official
#      kubernetes/autoscaler project includes a Hetzner cloud provider that
#      creates/deletes servers directly via the Hetzner API based on pod demand.
# See: rke2-hetzner-architecture/decisions/adr-007-cluster-autoscaler.md
#
# COMPROMISE: Autoscaler-created nodes are NOT tracked by Rancher machine pools.
#   They appear as regular Kubernetes worker nodes managed by the autoscaler.
#   This is acceptable for ephemeral workers that scale based on demand.
#
# PREREQUISITES (after cluster creation):
#   1. HCLOUD_TOKEN secret must exist in downstream kube-system namespace
#      (same secret used by CCM and CSI — created once, used by all)
#   2. RKE2 server URL and join token must be provided (see below)
#
# HOW TO GET RKE2 JOIN INFO:
#   Server URL: https://<control-plane-lb-ip>:9345 or first CP node internal IP
#   Join Token: ssh to a CP node → cat /var/lib/rancher/rke2/server/node-token
#   Or via kubectl: kubectl -n kube-system get secret rke2-server -o jsonpath='{.data.token}' | base64 -d
autoscaler:
  enabled: false
  # Helm chart version from https://kubernetes.github.io/autoscaler
  version: "9.43.2"

  # Node groups define autoscaling pools.
  # Each group creates Hetzner servers of a specific type in a specific location.
  # minSize: minimum number of nodes (can be 0 for scale-to-zero)
  # maxSize: maximum number of nodes the autoscaler can create
  # serverType: Hetzner server type (cx22, cx32, cx42, cx52, etc.)
  # serverLocation: Hetzner datacenter (fsn1, nbg1, hel1, ash, hil)
  # name: unique pool name (used as Hetzner server name prefix)
  nodeGroups: []
  # Example:
  # nodeGroups:
  #   - name: workers
  #     minSize: 1
  #     maxSize: 10
  #     serverType: cx33
  #     serverLocation: fsn1
  #   - name: gpu-workers
  #     minSize: 0
  #     maxSize: 5
  #     serverType: cx52
  #     serverLocation: nbg1

  # RKE2 join configuration for autoscaler-created nodes.
  # REQUIRED when autoscaler is enabled — nodes must join the RKE2 cluster.
  rke2:
    # Control plane server URL (e.g., https://10.0.1.1:9345)
    serverUrl: ""
    # Cluster join token (from /var/lib/rancher/rke2/server/node-token)
    joinToken: ""

  # Scale-down behavior (when nodes become idle)
  scaleDown:
    enabled: true
    # How long to wait after a scale-up before considering scale-down
    delay: "10m"
    # How long a node must be unneeded before it's removed
    unneededTime: "10m"
    # Target utilization threshold (0.0-1.0) — nodes below this are candidates
    utilizationThreshold: "0.5"

  # Optional: Override Hetzner settings (inherits from hetzner.* if empty)
  network: ""    # defaults to hetzner.network
  firewall: ""   # managed per-pool by default
  sshKey: ""     # no SSH key by default (zero-SSH architecture)

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Configuration
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: cloud-provider-name: external is mandatory for Hetzner CCM.
# Why: RKE2 must be told not to use its built-in cloud provider and instead
#      defer to the external Hetzner Cloud Controller Manager.
clusterConfig:
  cni: canal
  cloudProviderName: external
  secretsEncryption: true

# ═══════════════════════════════════════════════════════════════════════════════
#  Upgrade Strategy
# ═══════════════════════════════════════════════════════════════════════════════

upgradeStrategy:
  controlPlaneDrainOptions:
    enabled: false
  workerDrainOptions:
    enabled: false
  workerConcurrency: "10%"
  controlPlaneConcurrency: "10%"

# ═══════════════════════════════════════════════════════════════════════════════
#  Local Cluster Auth Endpoint (ACE)
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: ACE disabled by default.
# Why: Requires DNS setup for the downstream cluster FQDN. Enable for production
#      clusters that need direct kubectl access bypassing Rancher.
localClusterAuthEndpoint:
  enabled: false
  fqdn: ""
  caCerts: ""

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Members (RBAC)
# ═══════════════════════════════════════════════════════════════════════════════

clusterMembers: []
# Example:
# clusterMembers:
#   - principalName: "local://u-xxxxx"
#     roleTemplateName: "cluster-member"

# ═══════════════════════════════════════════════════════════════════════════════
#  Agent Environment Variables
# ═══════════════════════════════════════════════════════════════════════════════

# agentEnvs:
#   - name: HTTPS_PROXY
#     value: "http://proxy:8080"
