---
# ──────────────────────────────────────────────────────────────────────────────
# Hetzner RKE2 Cluster Template — Default values
#
# DECISION: Values are Hetzner-specific only. No multi-cloud conditionals.
# Why: Unlike upstream rancher/cluster-template-examples which supports AWS,
#      Azure, DO, vSphere — this chart is Hetzner-only. This keeps the chart
#      simple and the UI form focused.
# See: rke2-hetzner-architecture/designs/des-001-cluster-template-helm-chart.md
# ──────────────────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Identity
# ═══════════════════════════════════════════════════════════════════════════════

cluster:
  name: ""
  labels: {}
  annotations: {}

# ═══════════════════════════════════════════════════════════════════════════════
#  Rancher Cloud Credential
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: This references a Rancher Cloud Credential secret (type: Hetzner).
# Created manually in Rancher UI: Cluster Management → Cloud Credentials → Create.
# Contains the downstream project's HCLOUD_TOKEN (scoped to one Hetzner Project).
cloudCredentialSecretName: ""

# ═══════════════════════════════════════════════════════════════════════════════
#  Kubernetes
# ═══════════════════════════════════════════════════════════════════════════════

kubernetesVersion: "v1.34.4+rke2r1"

# ═══════════════════════════════════════════════════════════════════════════════
#  Hetzner Global Settings
# ═══════════════════════════════════════════════════════════════════════════════

hetzner:
  # WARNING: This network must exist in the DOWNSTREAM Hetzner project.
  # Hetzner private networks are project-scoped — a network from the management
  # project is invisible to downstream servers and will cause CCM/driver failures.
  # Leave empty if the downstream project has no private network.
  # See: rke2-hetzner-architecture/investigations/inv-004-downstream-provisioning-pitfalls.md
  network: ""
  usePrivateNetwork: true
  disablePublicIpv4: false
  disablePublicIpv6: true
  # DECISION: Default to golden:cis (auto-built CIS-hardened snapshot).
  # Why: golden:cis triggers the hcloud-image-controller to build a Packer snapshot
  #      with CIS hardening + pre-installed RKE2 matching the cluster's kubernetesVersion.
  #      This is the recommended production flow (ADR-009, ADR-012).
  # Options: "golden:cis", "golden:base", "ubuntu-24.04", or snapshot ID (e.g. "363889876").
  image: "golden:cis"

# ═══════════════════════════════════════════════════════════════════════════════
#  Node Pools
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: Default is a single converged pool (etcd + cp + worker) with 3 nodes.
# Why: Simplest HA setup for small/medium workloads. Operators can add dedicated
#      worker pools or split roles via the Rancher UI form (questions.yaml).
nodepools:
  - name: pool-all
    displayName: "All Roles"
    quantity: 3
    etcd: true
    controlplane: true
    worker: true
    # DECISION: cx23 as default — cheapest server type for downstream clusters.
    # 2 vCPU, 4 GB RAM, 40 GB disk. Sufficient for small workloads.
    # Scale up to cx33/cx43 for production via questions.yaml dropdown.
    serverType: cx23
    serverLocation: hel1
    # DECISION: createFirewall + autoCreateFirewallRules = true by default.
    # Why: The zsys-studio driver manages a shared cluster firewall automatically.
    # It adds/removes node IPs as /32 source CIDRs for internal rules.
    # See: rke2-hetzner-architecture/investigations/inv-002-hetzner-machine-driver.md
    createFirewall: true
    autoCreateFirewallRules: true
    paused: false
    labels: {}
    taints: []
    userData: ""
    placementGroup: ""
    existingSshKey: ""
    rollingUpdate:
      maxUnavailable: "1"
      maxSurge: "1"
    # DECISION: Rancher-native autoscaling via CAPI machineDeploymentAnnotations.
    # When enabled, adds cluster.x-k8s.io/cluster-api-autoscaler-node-group-{min,max}-size
    # annotations to the MachineDeployment. Cluster Autoscaler on the management cluster
    # scales replicas → Rancher creates/deletes nodes via Node Driver → visible in UI pool.
    # Verified: 2026-03-04 — tested with zsys-studio Hetzner driver, scale-up/down works.
    autoscaler:
      enabled: false
      minSize: 1
      maxSize: 10

# ═══════════════════════════════════════════════════════════════════════════════
#  Hetzner Cloud Integrations (deployed via additionalManifest at bootstrap)
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: CCM is deployed via RKE2 HelmChart CRD in additionalManifest.
# Why: ManagedChart requires cluster-agent to be connected, but
#      cloud-provider-name: external adds a NoSchedule taint
#      (node.cloudprovider.kubernetes.io/uninitialized) on ALL nodes.
#      cattle-cluster-agent does NOT tolerate this taint → permanent deadlock.
#      additionalManifest + spec.bootstrap: true deploys CCM at RKE2 bootstrap,
#      BEFORE cluster-agent is needed. This is the native RKE2 mechanism
#      designed for CCM (see: https://docs.rke2.io/helm).
# DECISION: Storage (CSI) is NOT managed by this chart.
# Why: Hetzner CSI is only for Hetzner Cloud Volumes. Operators typically choose
#      Longhorn or Rook-Ceph for distributed storage. Storage driver selection
#      is the operator's responsibility — deploy via GitOps or Rancher Apps.
hcloud:
  # HCLOUD_TOKEN for downstream cluster CCM.
  # WARNING: Must be the EXACT SAME token as in the Cloud Credential above.
  # This token is embedded as a K8s Secret in the downstream cluster for CCM.
  # If this token differs from the Cloud Credential, CCM will fail to authenticate
  # → nodes get stuck with uninitialized taint → cluster never connects.
  # Helm cannot read the Cloud Credential secret at render time, so the token
  # must be provided separately. Double-check it matches.
  # See: rke2-hetzner-architecture/investigations/inv-004-downstream-provisioning-pitfalls.md
  token: ""
  ccm:
    enabled: true
    version: "1.30.1"

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Configuration
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: cloud-provider-name: external is mandatory for Hetzner CCM.
# Why: RKE2 must be told not to use its built-in cloud provider and instead
#      defer to the external Hetzner Cloud Controller Manager.
clusterConfig:
  cni: canal
  cloudProviderName: external
  secretsEncryption: true
  # DECISION: Expose clusterCIDR/serviceCIDR as configurable values.
  # Why: Hardcoding CIDRs is fragile. Operators may need non-overlapping ranges
  #      when multiple clusters share a network with pod routing (networking.enabled).
  #      Defaults match RKE2 defaults. Used in machineGlobalConfig AND CCM valuesContent.
  clusterCIDR: "10.42.0.0/16"
  serviceCIDR: "10.43.0.0/16"
  # DECISION: CIS Level 1 hardening profile for RKE2.
  # When enabled, sets `profile: cis` in RKE2 config which:
  #   - Fixes pod manifest file permissions (644 → 600) — CIS 1.1.1, 1.1.3, 1.1.5
  #   - Enables audit logging with default policy — CIS 1.2.16-19, 3.2.1
  #   - Sets service-account-extend-token-expiration=false — CIS 1.2.30
  #   - Creates default audit policy — CIS 3.2.1
  #   - Configures kubelet protections
  # Verified: 2026-03-04 CIS scan against downstream RKE2 cluster.
  # See: https://docs.rke2.io/security/hardening_guide
  cisProfile:
    enabled: false
    # "cis" for standard CIS 1.x profile, "cis-1.23" for older compat
    profile: "cis"
    # DECISION: PSA template for CIS mode.
    # Why: CIS profile enables Pod Security Admission enforcement. Without exemptions,
    #      system namespaces (kube-system, cattle-system, cattle-fleet-system) are
    #      blocked by "restricted" policy. rancher-restricted is a built-in Rancher
    #      template that exempts system namespaces.
    psaTemplate: "rancher-restricted"

# ═══════════════════════════════════════════════════════════════════════════════
#  Upgrade Strategy
# ═══════════════════════════════════════════════════════════════════════════════

upgradeStrategy:
  controlPlaneDrainOptions:
    enabled: false
  workerDrainOptions:
    enabled: false
  workerConcurrency: "10%"
  controlPlaneConcurrency: "10%"

# ═══════════════════════════════════════════════════════════════════════════════
#  Local Cluster Auth Endpoint (ACE)
# ═══════════════════════════════════════════════════════════════════════════════

# DECISION: ACE disabled by default.
# Why: Requires DNS setup for the downstream cluster FQDN. Enable for production
#      clusters that need direct kubectl access bypassing Rancher.
localClusterAuthEndpoint:
  enabled: false
  fqdn: ""
  caCerts: ""

# ═══════════════════════════════════════════════════════════════════════════════
#  Cluster Members (RBAC)
# ═══════════════════════════════════════════════════════════════════════════════

clusterMembers: []
# Example:
# clusterMembers:
#   - principalName: "local://u-xxxxx"
#     roleTemplateName: "cluster-member"

# ═══════════════════════════════════════════════════════════════════════════════
#  Agent Environment Variables
# ═══════════════════════════════════════════════════════════════════════════════

# agentEnvs:
#   - name: HTTPS_PROXY
#     value: "http://proxy:8080"
