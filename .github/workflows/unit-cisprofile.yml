# Badge: Unit: cisprofile
name: "Unit: cisprofile"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cisprofile:
    name: helm template (CIS profile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Render with CIS profile enabled
        # hcloud.token=test is a CI placeholder — not a real API token.
        # Real tokens are delivered via Rancher Cloud Credentials at deploy time.
        run: |
          helm template test ./charts \
            --namespace fleet-default \
            --set cluster.name=test \
            --set cloudCredentialSecretName=test \
            --set hcloud.token=test \
            --set clusterConfig.cisProfile.enabled=true \
            > /tmp/rendered-cis.yaml
      - name: Assert CIS profile set
        run: grep -q 'profile: cis' /tmp/rendered-cis.yaml
      - name: Assert PSA template set
        run: grep -q 'defaultPodSecurityAdmissionConfigurationTemplateName' /tmp/rendered-cis.yaml
