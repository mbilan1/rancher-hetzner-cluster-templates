name: "SAST: KICS"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  kics:
    name: KICS scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run KICS
        uses: Checkmarx/kics-github-action@v2.1.20
        with:
          path: charts
          type: Helm
          fail_on: high
          output_formats: json
