name: "SAST: KICS"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  kics:
    name: KICS scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run KICS
        uses: Checkmarx/kics-github-action@v2.1.20
        with:
          path: charts
          type: Helm
          fail_on: high
          output_formats: json
