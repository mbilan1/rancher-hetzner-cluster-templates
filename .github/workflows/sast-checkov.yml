name: "SAST: Checkov"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Render templates
        run: |
          mkdir -p /tmp/rendered
          helm template test ./charts \
            --namespace fleet-default \
            --set cluster.name=test \
            --set cloudCredentialSecretName=test \
            --set hcloud.token=ci-dummy-token \
            --output-dir /tmp/rendered
      - name: Run Checkov (Kubernetes)
        uses: bridgecrewio/checkov-action@2fd3901c8feb52417f27f0d9800259a106c1ec1e # v12.3089.0
        with:
          directory: /tmp/rendered
          framework: kubernetes
          compact: true
          quiet: true
          soft_fail: true
