# ──────────────────────────────────────────────────────────────────────────────
# SAST: Trivy
#
# Aqua Trivy — Helm chart / Kubernetes config security scanner.
# Badge: SAST: Trivy
# ──────────────────────────────────────────────────────────────────────────────

name: "SAST: Trivy"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy config scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.28.0
        with:
          scan-type: config
          scan-ref: ./charts
          exit-code: 1
          severity: HIGH,CRITICAL
          hide-progress: true
