# Badge: Unit: defaults
name: "Unit: defaults"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  defaults:
    name: helm template (default values)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Render with default values
        # hcloud.token=test is a CI placeholder — not a real API token.
        # Real tokens are delivered via Rancher Cloud Credentials at deploy time.
        run: |
          helm template test ./charts \
            --namespace fleet-default \
            --set cluster.name=test \
            --set cloudCredentialSecretName=test \
            --set hcloud.token=test \
            > /tmp/rendered-defaults.yaml
      - name: Assert Cluster CRD present
        run: grep -q 'kind: Cluster' /tmp/rendered-defaults.yaml
      - name: Assert HetznerConfig present
        run: grep -q 'kind: HetznerConfig' /tmp/rendered-defaults.yaml
      - name: Assert CCM HelmChart present
        run: grep -q 'hcloud-ccm' /tmp/rendered-defaults.yaml
      - name: Assert cloud-provider-name external
        run: grep -q 'cloud-provider-name: external' /tmp/rendered-defaults.yaml
